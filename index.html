<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kosmik Tumanlik</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff0055;
            --neon-purple: #bc13fe;
            --glass-bg: rgba(10, 10, 20, 0.65);
            --border-glow: rgba(0, 243, 255, 0.3);
            --bg-deep: #05000a;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg-deep);
            font-family: 'Roboto', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        #canvas-container {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        .ui-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 90%;
            max-width: 700px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .hud-container {
            pointer-events: auto;
            background: var(--glass-bg);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-top: 2px solid var(--neon-cyan);
            border-radius: 16px;
            padding: 25px;
            width: 100%;
            box-shadow:
                0 0 30px rgba(0, 0, 0, 0.8),
                inset 0 0 20px rgba(0, 243, 255, 0.05);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .hud-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            animation: scanline 3s linear infinite;
        }

        @keyframes scanline {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .input-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            position: relative;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 16px 20px;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-family: 'Roboto', sans-serif;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        input[type="text"]:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            background: rgba(0, 0, 0, 0.6);
        }

        button#btn {
            background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0 30px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button#btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.5);
            filter: brightness(1.2);
        }

        button#btn:active {
            transform: translateY(1px);
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 15px;
        }

        .color-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .color-item {
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
        }

        .color-label {
            color: #ccc;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        input[type="color"] {
            -webkit-appearance: none;
            appearance: none;
            border: none;
            width: 36px;
            height: 36px;
            cursor: pointer;
            background: none;
            padding: 0;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }

        input[type="color"]:hover {
            transform: scale(1.1);
            border-color: #fff;
        }

        .info-text {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.75rem;
            text-align: right;
            line-height: 1.4;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            letter-spacing: 4px;
            z-index: 100;
            transition: opacity 1.5s ease;
            flex-direction: column;
            background: radial-gradient(circle at center, #1a0b2e 0%, #000000 100%);
        }

        #loading h2 {
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            font-size: 2rem;
            text-shadow: 0 0 20px var(--neon-purple);
        }

        #loading p {
            color: var(--neon-cyan);
            margin-top: 15px;
            font-size: 0.9rem;
            animation: pulse 1.5s infinite;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.4;
            }
        }

        #title-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            color: var(--neon-cyan);
            text-shadow:
                0 0 20px var(--neon-cyan),
                0 0 40px var(--neon-cyan),
                0 0 60px var(--neon-purple);
            letter-spacing: 8px;
            text-transform: uppercase;
            pointer-events: none;
            white-space: nowrap;
        }

        canvas#text-canvas {
            display: none;
        }

        @media (max-width: 600px) {
            #title-display {
                font-size: 2rem;
                letter-spacing: 4px;
            }

            .hud-container {
                padding: 20px 15px;
            }

            .input-row {
                flex-direction: column;
                gap: 10px;
            }

            button#btn {
                width: 100%;
                justify-content: center;
                padding: 15px;
            }

            .info-text {
                display: none;
            }

            /* Hide extra text on mobile */
            .controls-row {
                flex-direction: row;
                justify-content: center;
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div id="loading">
        <h2>KOSMIK TEXNOLOGIYA</h2>
        <p>Nebula tizimi ishga tushmoqda...</p>
    </div>

    <div id="title-display"></div>

    <div class="ui-panel">
        <div class="hud-container">
            <div class="input-row">
                <div class="input-wrapper">
                    <input type="text" id="textInput" placeholder="MATNNI KIRITING (MAX 20)" maxlength="20">
                </div>
                <button type="button" id="btn">
                    YARATISH
                </button>
            </div>

            <div class="controls-row">
                <div class="color-group">
                    <div class="color-item">
                        <span class="color-label">Asosiy</span>
                        <input type="color" id="baseColor" value="#00f2ff" title="Zarracha rangi">
                    </div>
                    <div class="color-item">
                        <span class="color-label">Kontakt</span>
                        <input type="color" id="hoverColor" value="#ff0055" title="Sichqoncha rangi">
                    </div>
                </div>
                <div class="info-text">
                    3D INTERAKTIV<br>REJIM: FAOL
                </div>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>
    <canvas id="text-canvas"></canvas>

    <script>
        function createSmokeTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');

            const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            grad.addColorStop(0, 'rgba(255,255,255,0.4)');
            grad.addColorStop(0.4, 'rgba(255,255,255,0.1)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');

            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 128, 128);

            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050010, 0.0012);

        const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 1, 2000);
        camera.position.z = 150;

        const renderer = new THREE.WebGLRenderer({ alpha: false, antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById("canvas-container").appendChild(renderer.domElement);

        const nebulaGroup = new THREE.Group();
        const smokeTexture = createSmokeTexture();
        const nebulaGeo = new THREE.PlaneGeometry(150, 150);

        const nebulaColors = [
            new THREE.Color(0x220033),
            new THREE.Color(0x001133),
            new THREE.Color(0x330011),
            new THREE.Color(0x001133)
        ];

        const nebulaParticles = [];

        for (let i = 0; i < 40; i++) {
            const mat = new THREE.MeshBasicMaterial({
                map: smokeTexture,
                color: nebulaColors[Math.floor(Math.random() * nebulaColors.length)],
                transparent: true,
                opacity: 0.15,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide
            });

            const mesh = new THREE.Mesh(nebulaGeo, mat);
            mesh.position.set(
                (Math.random() - 0.5) * 600,
                (Math.random() - 0.5) * 300,
                (Math.random() - 0.5) * 400 - 100
            );
            mesh.rotation.z = Math.random() * Math.PI * 2;
            mesh.scale.setScalar(1 + Math.random() * 2);

            mesh.userData = {
                rotSpeed: (Math.random() - 0.5) * 0.002,
                moveSpeed: (Math.random() * 0.05) + 0.01
            };

            nebulaGroup.add(mesh);
            nebulaParticles.push(mesh);
        }
        scene.add(nebulaGroup);

        const starGeo = new THREE.BufferGeometry();
        const starCount = 10000;
        const starPos = new Float32Array(starCount * 3);
        const starSizes = new Float32Array(starCount);

        for (let i = 0; i < starCount; i++) {
            let i3 = i * 3;
            const r = 800 + Math.random() * 800;
            const theta = Math.random() * 2 * Math.PI;
            const phi = Math.acos(2 * Math.random() - 1);

            starPos[i3] = r * Math.sin(phi) * Math.cos(theta);
            starPos[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            starPos[i3 + 2] = r * Math.cos(phi);

            starSizes[i] = Math.random() * 1.5;
        }
        starGeo.setAttribute("position", new THREE.BufferAttribute(starPos, 3));
        starGeo.setAttribute("size", new THREE.BufferAttribute(starSizes, 1));

        const starMat = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 1.0,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const starField = new THREE.Points(starGeo, starMat);
        scene.add(starField);

        const COUNT = 50000;
        const pos = new Float32Array(COUNT * 3);
        const target = new Float32Array(COUNT * 3);
        const vel = new Float32Array(COUNT * 3);
        const col = new Float32Array(COUNT * 3);

        let baseColor = new THREE.Color("#00f2ff");
        let hoverColor = new THREE.Color("#ff0055");

        for (let i = 0; i < COUNT; i++) {
            let i3 = i * 3;
            pos[i3] = (Math.random() - 0.5) * 1000;
            pos[i3 + 1] = (Math.random() - 0.5) * 1000;
            pos[i3 + 2] = (Math.random() - 0.5) * 1000;

            col[i3] = baseColor.r;
            col[i3 + 1] = baseColor.g;
            col[i3 + 2] = baseColor.b;
        }

        const geo = new THREE.BufferGeometry();
        geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
        geo.setAttribute("color", new THREE.BufferAttribute(col, 3));

        const mat = new THREE.PointsMaterial({
            size: 0.35,
            vertexColors: true,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true
        });

        const points = new THREE.Points(geo, mat);
        scene.add(points);

        function sphere() {
            for (let i = 0; i < COUNT; i++) {
                let i3 = i * 3;
                let r = 45 * Math.cbrt(Math.random());
                let theta = Math.random() * 2 * Math.PI;
                let phi = Math.acos(2 * Math.random() - 1);
                target[i3] = r * Math.sin(phi) * Math.cos(theta);
                target[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                target[i3 + 2] = r * Math.cos(phi);
            }
        }
        sphere();

        const tCanvas = document.getElementById("text-canvas");
        const tCtx = tCanvas.getContext("2d");

        function textShape(txt) {
            const maxWidth = 1600;
            const maxHeight = 250;
            let fontSize = 300;

            tCanvas.width = maxWidth;
            tCanvas.height = maxHeight;
            tCtx.clearRect(0, 0, maxWidth, maxHeight);
            tCtx.fillStyle = "#fff";
            tCtx.textAlign = "center";
            tCtx.textBaseline = "middle";

            tCtx.font = `bold ${fontSize}px 'Orbitron', sans-serif`;
            let textWidth = tCtx.measureText(txt).width;

            while (textWidth > maxWidth - 100 && fontSize > 40) {
                fontSize -= 5;
                tCtx.font = `bold ${fontSize}px 'Orbitron', sans-serif`;
                textWidth = tCtx.measureText(txt).width;
            }

            tCtx.fillText(txt, maxWidth / 2, maxHeight / 2);

            const img = tCtx.getImageData(0, 0, maxWidth, maxHeight).data;
            let pts = [];

            let scale = 0.065;

            for (let y = 0; y < maxHeight; y += 3) {
                for (let x = 0; x < maxWidth; x += 3) {
                    if (img[(y * maxWidth + x) * 4 + 3] > 128) {
                        pts.push({ x: (x - maxWidth / 2) * scale, y: (maxHeight / 2 - y) * scale });
                    }
                }
            }

            if (pts.length === 0) return sphere();

            for (let i = 0; i < COUNT; i++) {
                let i3 = i * 3;
                let p = pts[i % pts.length];
                target[i3] = p.x;
                target[i3 + 1] = p.y;
                target[i3 + 2] = (Math.random() - 0.5) * 5;
            }
        }

        let mouse = { x: 9999, y: 9999 };

        document.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX - innerWidth / 2) * 0.25;
            mouse.y = -(e.clientY - innerHeight / 2) * 0.25;
        });

        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouse.x = (e.touches[0].clientX - innerWidth / 2) * 0.25;
                mouse.y = -(e.touches[0].clientY - innerHeight / 2) * 0.25;
            }
        });

        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.00005;
            nebulaGroup.rotation.z = time * 0.5;
            nebulaGroup.rotation.y = time * 0.2;

            nebulaParticles.forEach(p => {
                p.rotation.z += p.userData.rotSpeed;
                p.position.x += Math.sin(time + p.position.y) * 0.05;
            });


            starField.rotation.y -= 0.0003;

            for (let i = 0; i < COUNT; i++) {
                let i3 = i * 3;

                vel[i3] *= 0.94;
                vel[i3 + 1] *= 0.94;
                vel[i3 + 2] *= 0.94;

                let dx = pos[i3] - mouse.x;
                let dy = pos[i3 + 1] - mouse.y;
                let distSq = dx * dx + dy * dy;
                let dist = Math.sqrt(distSq);

                if (dist < 40 && dist > 0.1) {
                    let force = (40 - dist) * 0.015;
                    vel[i3] += (dx / dist) * force;
                    vel[i3 + 1] += (dy / dist) * force;
                    vel[i3 + 2] += (Math.random() - 0.5) * 1.0;

                    // Rang o'zgarishi (Silliq) 
                    col[i3] += (hoverColor.r - col[i3]) * 0.2;
                    col[i3 + 1] += (hoverColor.g - col[i3 + 1]) * 0.2;
                    col[i3 + 2] += (hoverColor.b - col[i3 + 2]) * 0.2;
                } else {
                    col[i3] += (baseColor.r - col[i3]) * 0.05;
                    col[i3 + 1] += (baseColor.g - col[i3 + 1]) * 0.05;
                    col[i3 + 2] += (baseColor.b - col[i3 + 2]) * 0.05;
                }

                pos[i3] += vel[i3] + (target[i3] - pos[i3]) * 0.06;
                pos[i3 + 1] += vel[i3 + 1] + (target[i3 + 1] - pos[i3 + 1]) * 0.06;
                pos[i3 + 2] += vel[i3 + 2] + (target[i3 + 2] - pos[i3 + 2]) * 0.06;
            }

            geo.attributes.position.needsUpdate = true;
            geo.attributes.color.needsUpdate = true;

            // Butun tizimni juda sekin aylantirish (3D effekt uchun) 
            points.rotation.y = Math.sin(time * 0.5) * 0.1;
            points.rotation.z = Math.cos(time * 0.3) * 0.05;

            renderer.render(scene, camera);
        }
        animate();

        const btn = document.getElementById("btn");
        const textInput = document.getElementById("textInput");
        const loading = document.getElementById("loading");
        const titleDisplay = document.getElementById("title-display");

        // Boshlang'ich matn
        titleDisplay.textContent = "FARRUXBEK";

        document.getElementById("baseColor").addEventListener("input", (e) => {
            baseColor = new THREE.Color(e.target.value);
        });

        document.getElementById("hoverColor").addEventListener("input", (e) => {
            hoverColor = new THREE.Color(e.target.value);
        });

        btn.onclick = () => {
            const v = textInput.value.trim();
            if (v) {
                textShape(v);
                titleDisplay.textContent = v.toUpperCase();
            } else {
                sphere();
                titleDisplay.textContent = "FARRUXBEK";
            }
        };

        textInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") btn.click();
        });

        window.onload = () => {
            loading.style.opacity = 0;
            setTimeout(() => loading.remove(), 1500);
        };

        window.addEventListener("resize", () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        }); 
    </script>
</body>

</html>
