<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Hand Controller - MediaPipe + Three.js</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            background: #000;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #video {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            height: 240px;
            border: 3px solid #00f3ff;
            border-radius: 10px;
            z-index: 10;
            transform: scaleX(-1);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00f3ff;
            font-size: 16px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #00f3ff;
            max-width: 300px;
        }

        #info h2 {
            margin-bottom: 10px;
            font-size: 20px;
        }

        #info p {
            margin: 5px 0;
            font-size: 14px;
        }

        .status {
            color: #ff0055;
            font-weight: bold;
        }

        .active {
            color: #00ff00;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00f3ff;
            font-size: 24px;
            z-index: 100;
            flex-direction: column;
        }

        #loading p {
            margin-top: 20px;
            font-size: 16px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div id="loading">
        <h1>3D HAND CONTROLLER</h1>
        <p>Yuklanmoqda...</p>
    </div>

    <div id="container"></div>
    <video id="video" autoplay playsinline></video>

    <div id="info">
        <h2>🎮 Boshqaruv</h2>
        <p>Status: <span class="status" id="status">Kutilmoqda...</span></p>
        <p>✋ Ochiq qo'l: Harakatlantirish</p>
        <p>✊ Yopiq qo'l: Ushlab tortish</p>
        <p>📏 Qo'l masofasi: Chuqurlik</p>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.02);

        const camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, 0, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        document.getElementById('container').appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 5, 5);
        directionalLight.castShadow = true;
        scene.add(directionalLight);

        // Cursor (hand position indicator)
        const cursorGeometry = new THREE.SphereGeometry(0.1, 32, 32);
        const cursorMaterial = new THREE.MeshBasicMaterial({
            color: 0x00f3ff,
            transparent: true,
            opacity: 0.8
        });
        const cursor = new THREE.Mesh(cursorGeometry, cursorMaterial);
        scene.add(cursor);

        // Cursor glow
        const glowGeometry = new THREE.SphereGeometry(0.15, 32, 32);
        const glowMaterial = new THREE.MeshBasicMaterial({
            color: 0x00f3ff,
            transparent: true,
            opacity: 0.3
        });
        const glow = new THREE.Mesh(glowGeometry, glowMaterial);
        cursor.add(glow);

        // Create interactive objects
        const objects = [];
        const colors = [0xff0055, 0x00f3ff, 0xbc13fe, 0xffaa00, 0x00ff88];

        for (let i = 0; i < 5; i++) {
            const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const material = new THREE.MeshStandardMaterial({
                color: colors[i],
                metalness: 0.5,
                roughness: 0.5
            });
            const cube = new THREE.Mesh(geometry, material);

            cube.position.set(
                (Math.random() - 0.5) * 6,
                (Math.random() - 0.5) * 4,
                (Math.random() - 0.5) * 4
            );

            cube.castShadow = true;
            cube.receiveShadow = true;
            cube.userData.originalColor = colors[i];
            cube.userData.isDragging = false;

            scene.add(cube);
            objects.push(cube);
        }

        // Ground plane
        const planeGeometry = new THREE.PlaneGeometry(20, 20);
        const planeMaterial = new THREE.MeshStandardMaterial({
            color: 0x1a1a2e,
            side: THREE.DoubleSide
        });
        const plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.rotation.x = Math.PI / 2;
        plane.position.y = -2;
        plane.receiveShadow = true;
        scene.add(plane);

        // Hand tracking variables
        let handDetected = false;
        let isGrabbing = false;
        let targetObject = null;
        const handPosition = new THREE.Vector3();
        const depthZ = { value: 0 };

        // MediaPipe Hands setup
        const videoElement = document.getElementById('video');
        const statusElement = document.getElementById('status');

        const hands = new Hands({
            locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
            }
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 1280,
            height: 720
        });

        cameraUtils.start();

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                handDetected = true;
                statusElement.textContent = 'Faol';
                statusElement.className = 'status active';

                const landmarks = results.multiHandLandmarks[0];

                // Index finger tip (landmark 8)
                const indexTip = landmarks[8];

                // Calculate hand position (normalized to -1 to 1)
                handPosition.x = -(indexTip.x - 0.5) * 8;
                handPosition.y = -(indexTip.y - 0.5) * 6;

                // Calculate depth using distance between thumb and index finger
                const thumb = landmarks[4];
                const index = landmarks[8];
                const distance = Math.sqrt(
                    Math.pow(thumb.x - index.x, 2) +
                    Math.pow(thumb.y - index.y, 2)
                );

                // Map distance to depth (-3 to 3)
                depthZ.value = THREE.MathUtils.mapLinear(distance, 0.02, 0.15, -3, 3);
                depthZ.value = THREE.MathUtils.clamp(depthZ.value, -3, 3);

                handPosition.z = depthZ.value;

                // Detect grab gesture (closed fist)
                const middleMCP = landmarks[9];
                const middleTip = landmarks[12];
                const grabDistance = Math.sqrt(
                    Math.pow(middleMCP.x - middleTip.x, 2) +
                    Math.pow(middleMCP.y - middleTip.y, 2)
                );

                isGrabbing = grabDistance < 0.05;

            } else {
                handDetected = false;
                statusElement.textContent = 'Qo\'l topilmadi';
                statusElement.className = 'status';
                isGrabbing = false;
            }
        }

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            // Update cursor position
            if (handDetected) {
                cursor.position.lerp(handPosition, 0.2);

                // Cursor color based on grab state
                if (isGrabbing) {
                    cursorMaterial.color.setHex(0xff0055);
                } else {
                    cursorMaterial.color.setHex(0x00f3ff);
                }

                // Glow animation
                glow.scale.setScalar(1 + Math.sin(Date.now() * 0.005) * 0.2);
            }

            // Check collision and drag
            objects.forEach(obj => {
                const distance = cursor.position.distanceTo(obj.position);

                if (distance < 0.6) {
                    if (isGrabbing && !obj.userData.isDragging) {
                        obj.userData.isDragging = true;
                        targetObject = obj;
                        obj.material.emissive.setHex(0x444444);
                    }

                    if (!isGrabbing) {
                        obj.userData.isDragging = false;
                        obj.material.emissive.setHex(0x000000);
                    }

                    // Highlight on hover
                    if (!obj.userData.isDragging) {
                        obj.material.color.setHex(0xffffff);
                    }
                } else {
                    obj.material.color.setHex(obj.userData.originalColor);
                    if (!isGrabbing) {
                        obj.userData.isDragging = false;
                    }
                }

                // Drag object
                if (obj.userData.isDragging && isGrabbing) {
                    obj.position.lerp(cursor.position, 0.1);
                }

                // Rotate objects
                obj.rotation.x += 0.01;
                obj.rotation.y += 0.01;
            });

            renderer.render(scene, camera);
        }

        // Window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Hide loading screen
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
        }, 2000);

        animate();
    </script>
</body>

</html>
